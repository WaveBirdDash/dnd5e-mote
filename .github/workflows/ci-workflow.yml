name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  markdown-link-check:
    name: Markdown Link Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: markdown-link-check-action
        uses: tcort/github-action-markdown-link-check@v1.1.2
        with:
          base-branch: main
          folder-path: "docs"
          use-quiet-mode: yes
