name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  link-validator:
    name: Link Validator
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run Link Validator
        uses: your-ko/link-validator@2.4.0
        with:
          lookupPath: ./docs/
          validators:
            http:
              enabled: false
            localPath:
              enabled: true

